name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0) — for manual dry runs"
        required: true

permissions:
  contents: write       # create the GitHub Release
  id-token: write       # provenance attestation
  attestations: write   # provenance attestation

env:
  CARGO_TERM_COLOR: always
  # Pinned upstream krakjoe/pcov release tag, built per cell alongside yerd-dump
  # (see the build-pcov job). v1.0.12 (2024-12-04) is the latest tag and the
  # version PECL/windows.php.net ship for PHP 8.5; its source has no upper-bound
  # PHP_VERSION_ID gate, so it compiles across 8.2–8.5. Bump to adopt a newer pcov.
  PCOV_VERSION: "1.0.12"

jobs:
  build:
    name: build ${{ matrix.php }} • ${{ matrix.cell.label }}
    runs-on: ${{ matrix.cell.os }}
    strategy:
      fail-fast: false
      # Two real dimensions → full cross product (4 minors × 3 cells = 12 jobs).
      # NOTE: do NOT express the cells via `include:` on a php-only base matrix —
      # include entries whose keys aren't in the base overwrite each other, so
      # only the last cell survives. `cell` must be a first-class matrix key.
      #
      # Floor is 8.2: ext-php-rs 0.15.15 requires >= 8.1, and zend_observer only
      # observes internal functions (PDO queries) from 8.2+ (8.0/8.1 are EOL).
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]
        cell:
          # Yerd supports Apple Silicon only (no Intel macOS), so there is no
          # macos-x86_64 cell. `toolchain` is per-cell: Windows needs nightly for
          # ext-php-rs's `abi_vectorcall` feature (src/lib.rs), the rest stay stable.
          # Windows is NTS x86_64 only — native arm64 has no GitHub runners / no
          # arm64 PHP dev packs (x64-under-emulation covers ARM hosts).
          - { os: macos-14,         label: macos-aarch64, target_os: macos,   arch: aarch64, toolchain: stable }
          - { os: ubuntu-22.04,     label: linux-x86_64,  target_os: linux,   arch: x86_64,  toolchain: stable }
          - { os: ubuntu-22.04-arm, label: linux-aarch64, target_os: linux,   arch: aarch64, toolchain: stable }
          - { os: windows-2022,     label: windows-x86_64, target_os: windows, arch: x86_64, toolchain: nightly }
    steps:
      - uses: actions/checkout@v4

      - name: Install PHP (NTS, non-debug, with dev headers)
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: opcache, pdo_sqlite
          tools: none
        # setup-php installs NTS by default on Windows; pin it explicitly. The
        # build-id guard below is the actual enforcement. (No-op env on Unix.)
        env:
          phpts: nts

      - name: Set up LLVM/libclang + linker PATH (Windows)
        if: matrix.cell.target_os == 'windows'
        shell: bash
        run: |
          set -euo pipefail
          # ext-php-rs reads the php.exe setup-php put on PATH (version + thread
          # safety) to auto-download the matching dev pack from windows.php.net,
          # then links php8.lib from it — find_php discovers php.exe via PATH, so we
          # don't set $PHP (a Git Bash /c/... path could confuse the native build).
          # bindgen needs libclang (windows-2022 ships LLVM); lld-link (also from
          # LLVM) is the configured linker (.cargo/config.toml) — prepend its bin
          # dir to PATH so both libclang.dll and lld-link.exe resolve.
          llvm="/c/Program Files/LLVM"
          if [ ! -d "$llvm/bin" ]; then
            echo "LLVM not found at $llvm; installing via choco"
            choco install llvm -y --no-progress
          fi
          test -f "$llvm/bin/lld-link.exe" || { echo "FAIL: lld-link.exe missing under $llvm/bin"; exit 1; }
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> "$GITHUB_ENV"
          echo "C:\\Program Files\\LLVM\\bin" >> "$GITHUB_PATH"

      - name: Set up MSVC dev environment (Windows)
        if: matrix.cell.target_os == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install libclang (bindgen)
        if: matrix.cell.target_os != 'windows'
        run: |
          if [ "${{ matrix.cell.target_os }}" = "linux" ]; then
            # clang/libclang >= 15: ubuntu-22.04's default llvm-14 emmintrin.h
            # breaks bindgen on PHP's SSE2 intrinsics ("invalid conversion
            # ... __m128i"). Force llvm-15 via both LIBCLANG_PATH (which libclang
            # loads) and -resource-dir (which clang headers it uses). clang-15 is
            # in jammy for both x86_64 and arm64.
            sudo apt-get update && sudo apt-get install -y clang-15 libclang-15-dev llvm-15-dev
            echo "LIBCLANG_PATH=/usr/lib/llvm-15/lib" >> "$GITHUB_ENV"
            echo "BINDGEN_EXTRA_CLANG_ARGS=-resource-dir=$(clang-15 -print-resource-dir)" >> "$GITHUB_ENV"
            clang-15 --version | head -1
          else
            # The runner's Xcode clang (15.0.0) trips bindgen on arm_neon.h fp16
            # intrinsics. Force a newer brew clang via both LIBCLANG_PATH and an
            # explicit -resource-dir (the resource-dir is the part that actually
            # bypasses the broken headers — same fix as Linux).
            brew install llvm
            prefix="$(brew --prefix llvm)"
            test -f "$prefix/lib/libclang.dylib" || { echo "FAIL: libclang.dylib not at $prefix/lib"; exit 1; }
            echo "LIBCLANG_PATH=$prefix/lib" >> "$GITHUB_ENV"
            echo "BINDGEN_EXTRA_CLANG_ARGS=-resource-dir=$("$prefix/bin/clang" -print-resource-dir)" >> "$GITHUB_ENV"
            "$prefix/bin/clang" --version | head -1
          fi

      - name: Install Rust (${{ matrix.cell.toolchain }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.cell.toolchain }}

      - uses: Swatinem/rust-cache@v2
        with:
          # Isolate the cache per PHP version + cell. ext-php-rs embeds the active
          # PHP's module API number in the built .so; a cross-version cache hit
          # produces an .so PHP refuses to load. The key prefix also evicts any
          # previously-poisoned caches.
          key: php-${{ matrix.php }}-${{ matrix.cell.label }}

      - name: Set deployment target (macOS portability)
        if: matrix.cell.target_os == 'macos'
        run: echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"

      - name: Build (release)
        # `+${toolchain}` pins per-cell: nightly on Windows (abi_vectorcall),
        # stable elsewhere. dtolnay/rust-toolchain@master installed it above.
        run: cargo +${{ matrix.cell.toolchain }} build --release

      - name: Stage artifact
        id: stage
        shell: bash
        run: |
          if [ "${{ matrix.cell.target_os }}" = "windows" ]; then
            # cdylib on Windows → yerd_dump.dll (no `lib` prefix). Distribute .dll.
            ext="dll"; src="target/release/yerd_dump.dll"
          elif [ "${{ matrix.cell.target_os }}" = "macos" ]; then
            ext="so"; src="target/release/libyerd_dump.dylib"
          else
            ext="so"; src="target/release/libyerd_dump.so"
          fi
          name="yerd-dump-${{ matrix.php }}-${{ matrix.cell.label }}.${ext}"
          mkdir -p dist
          cp "$src" "dist/$name"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "path=dist/$name" >> "$GITHUB_OUTPUT"

      - name: Build-id property guard (absolute, not self-comparison)
        shell: bash
        run: |
          set -euo pipefail
          info="$(php -i)"
          echo "$info" | grep -E "Thread Safety => disabled" \
            || { echo "FAIL: PHP build is ZTS (must be NTS)"; exit 1; }
          echo "$info" | grep -E "Debug Build => no" \
            || { echo "FAIL: PHP is a debug build"; exit 1; }
          echo "PHP API:"; echo "$info" | grep -E "PHP API|Zend Extension Build|PHP Extension Build" || true
          # Optional cross-vendor check: Yerd publishes the exact build-id its
          # static-php.dev PHP reports per minor. When provided, assert equality.
          if [ -n "${EXPECTED_PHP_EXTENSION_BUILD:-}" ]; then
            echo "$info" | grep -F "$EXPECTED_PHP_EXTENSION_BUILD" \
              || { echo "FAIL: build-id mismatch vs Yerd's PHP"; exit 1; }
          fi

      - name: Load smoke
        shell: bash
        run: |
          # Verify the .so loads via the SCRIPT-EXECUTION path (php -r +
          # extension_loaded), NOT `php -m`. The `-m` module-info path is
          # intermittently flaky on macOS runners (transient dlopen issue under
          # -undefined dynamic_lookup, never on Linux); the script path is the one
          # the real app uses and is reliable. extension_loaded is an exact check.
          # Retry + print startup stderr on total failure as belt-and-braces.
          so="$PWD/${{ steps.stage.outputs.path }}"
          for attempt in 1 2 3 4 5; do
            if php -d extension="$so" -d display_startup_errors=1 \
                 -r 'exit(extension_loaded("yerd-dump") ? 0 : 1);' 2>/tmp/load.err; then
              echo "loaded (attempt $attempt)"; exit 0
            fi
            echo "load attempt $attempt failed; retrying…"; sleep 1
          done
          echo "FAIL: extension did not load after retries"; cat /tmp/load.err || true; exit 1

      - name: Integration smoke (frame streaming, Unix only)
        # The full smoke needs python3 + bash /dev/tcp, which are unreliable under
        # Git Bash on the Windows runner; Windows is gated by the load+INI smoke
        # below (the contract that matters). See plan: full Windows frame smoke is
        # a deferred follow-up.
        if: matrix.cell.target_os != 'windows'
        shell: bash
        run: |
          EXT_SO="$PWD/${{ steps.stage.outputs.path }}" PHP="$(which php)" PORT=2304 \
            bash tests/integration/smoke.sh

      - name: Load + INI smoke (Windows)
        if: matrix.cell.target_os == 'windows'
        shell: bash
        run: |
          set -euo pipefail
          # Use a NATIVE Windows temp path ($RUNNER_TEMP), not mktemp's MSYS
          # /tmp/... which native php.exe can't resolve. Assert the .dll loads and
          # the PHP_INI_SYSTEM directive is registered + visible via -d (the same
          # contract smoke.sh step [2/4] checks on Unix).
          so="$PWD/${{ steps.stage.outputs.path }}"
          state="$RUNNER_TEMP/yerd-state.json"
          echo '{"enabled":false,"port":2304,"features":{}}' > "$state"
          php -d extension="$so" -d display_startup_errors=1 \
            -r 'exit(extension_loaded("yerd-dump") ? 0 : 1);'
          got="$(php -d extension="$so" -d yerd_dump.state_path="$state" \
            -r 'echo ini_get("yerd_dump.state_path");')"
          [ "$got" = "$state" ] || { echo "FAIL: state_path not visible (got '$got')"; exit 1; }
          echo "ok: yerd-dump.dll loaded + INI directive visible"

      # NOTE: build-provenance attestation is done ONCE in the publish job over all
      # artifacts (1 Rekor call instead of 16), so a transient Sigstore outage can't
      # fail a build leg and skip the release.

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.name }}
          path: ${{ steps.stage.outputs.path }}
          if-no-files-found: error

  # pcov — the upstream krakjoe/pcov code-coverage driver — rides the SAME v*
  # release as yerd-dump so the repo has a single release stream (yerd-dump's
  # consumer fetches /releases/latest/download/manifest.json; a separate pcov
  # release would steal "latest" and 404 that URL). It is built from upstream C
  # with the standard PHP extension toolchain (NO Rust/libclang). Its artifacts
  # are published under a SEPARATE pcov-manifest.json (never merged into
  # manifest.json) so yerd's (php,os,arch)-only matcher can never grab a pcov .so
  # when it wants yerd-dump. This job is required: if pcov breaks, `publish`
  # (needs: build-pcov) does not run and the whole release is blocked.
  build-pcov:
    name: pcov ${{ matrix.php }} • ${{ matrix.cell.label }}
    runs-on: ${{ matrix.cell.os }}
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]
        cell:
          - { os: macos-14,         label: macos-aarch64,  target_os: macos,   arch: aarch64 }
          - { os: ubuntu-22.04,     label: linux-x86_64,   target_os: linux,   arch: x86_64 }
          - { os: ubuntu-22.04-arm, label: linux-aarch64,  target_os: linux,   arch: aarch64 }
          # Windows NTS x86_64: built from source via php/php-windows-builder
          # (nmake), not phpize/make. NTS-only (consumer can't express TS/toolset).
          - { os: windows-2022,     label: windows-x86_64, target_os: windows, arch: x86_64 }
    steps:
      - name: Install PHP (NTS, non-debug, with dev headers + phpize)
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          # Do NOT add pcov here — we build it from source. coverage:none avoids
          # setup-php pulling in a pcov/xdebug of its own.
          coverage: none
          tools: none
        # NTS by default on Windows; pin it. This php.exe is the loader for the
        # smoke + build-property guard (the php-windows-builder action provisions
        # its OWN PHP/SDK internally for the actual compile). No-op env on Unix.
        env:
          phpts: nts

      - name: Set deployment target (macOS portability)
        if: matrix.cell.target_os == 'macos'
        run: echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"

      - name: Fetch pinned pcov source
        if: matrix.cell.target_os != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/krakjoe/pcov/archive/refs/tags/v${PCOV_VERSION}.tar.gz"
          echo "Fetching $url"
          curl -fsSL "$url" -o pcov-src.tar.gz
          mkdir -p pcov-src
          tar -xzf pcov-src.tar.gz -C pcov-src --strip-components=1
          test -f pcov-src/pcov.c || { echo "FAIL: pcov.c not found in source tarball"; exit 1; }

      - name: Build pcov (phpize && configure && make)
        if: matrix.cell.target_os != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          # macOS only: pcov includes PHP's ext/pcre/php_pcre.h, which #includes
          # "pcre2.h". With Homebrew PHP that header lives in the separate pcre2
          # keg (not in PHP's include dir), so the compile fails with
          # "'pcre2.h' file not found". Add the keg's include dir to CPPFLAGS.
          # (Linux's setup-php ships pcre2 headers inline, so no flag is needed.)
          if [ "${{ matrix.cell.target_os }}" = "macos" ]; then
            brew install pcre2   # idempotent; PHP already depends on it
            export CPPFLAGS="-I$(brew --prefix pcre2)/include${CPPFLAGS:+ $CPPFLAGS}"
            echo "CPPFLAGS=$CPPFLAGS"
          fi
          cd pcov-src
          phpize
          ./configure --enable-pcov
          make -j"$(getconf _NPROCESSORS_ONLN)"

      - name: Build pcov (Windows, php-windows-builder / nmake)
        if: matrix.cell.target_os == 'windows'
        # Pinned action (not a moving @v1) so the 8.5/VS17 support is reproducible.
        # NB: the tag has NO `v` prefix (it is `1.8.1`, unlike krakjoe/pcov's
        # `v1.0.12`). It self-checks-out + fetches krakjoe/pcov, provisions its own
        # PHP-SDK, runs config.w32 + nmake, and writes the build to artifacts/*.zip
        # on disk (which the Stage step below consumes). run-tests:false — we gate
        # via our own load+namespace smoke, not pcov's upstream .phpt suite.
        uses: php/php-windows-builder/extension@1.8.1
        with:
          extension-url: https://github.com/krakjoe/pcov
          extension-ref: v${{ env.PCOV_VERSION }}
          php-version: ${{ matrix.php }}
          arch: x64
          ts: nts
          run-tests: false

      - name: Stage artifact
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.cell.target_os }}" = "windows" ]; then
            name="pcov-${{ matrix.php }}-windows-x86_64.dll"
            # php-windows-builder leaves the build zip in ./artifacts. Assert
            # exactly one, and that the build's OWN self-reported name is NTS + 64-bit
            # (reject -ts-/32-bit -x86 — the consumer can't express either). The arch
            # token is "x86_64" by default and "x64" under ARTIFACT_NAMING_SCHEME=pecl,
            # so accept both; "-x86.zip" (32-bit) matches neither. Capture the vsNN
            # toolset token for the guard step.
            shopt -s nullglob
            zips=(artifacts/*.zip)
            [ "${#zips[@]}" -eq 1 ] || { echo "FAIL: expected 1 build zip, found ${#zips[@]}"; printf '%s\n' "${zips[@]:-<none>}"; exit 1; }
            zip="${zips[0]}"; base="$(basename "$zip")"
            echo "build zip: $base"
            case "$base" in *-nts-*) ;; *) echo "FAIL: build is not NTS: $base"; exit 1;; esac
            case "$base" in *-x64.zip|*-x86_64.zip) ;; *) echo "FAIL: build is not 64-bit: $base"; exit 1;; esac
            vs="$(echo "$base" | grep -oE 'vs[0-9]+' | head -1)"
            [ -n "$vs" ] || { echo "FAIL: could not parse vsNN toolset from $base"; exit 1; }
            echo "vs=$vs" >> "$GITHUB_OUTPUT"
            mkdir -p dist unzipped
            unzip -o "$zip" -d unzipped >/dev/null
            # The loadable module inside is versioned, e.g.
            # php_pcov-v1.0.12-8.2-nts-vs16-x86_64.dll (not a bare php_pcov.dll);
            # match the prefix. PHP loads it by path and reads the embedded module
            # name ("pcov"), so our rename to pcov-<minor>-windows-x86_64.dll is fine.
            dll="$(find unzipped -iname 'php_pcov*.dll' | head -1)"
            [ -n "$dll" ] || { echo "FAIL: no php_pcov*.dll in $base"; find unzipped; exit 1; }
            cp "$dll" "dist/$name"
          else
            name="pcov-${{ matrix.php }}-${{ matrix.cell.label }}.so"
            # phpize/libtool puts the loadable module at modules/pcov.so; on some
            # configs the real object is .libs/pcov.so behind a libtool wrapper.
            if [ -f pcov-src/modules/pcov.so ]; then
              src="pcov-src/modules/pcov.so"
            elif [ -f pcov-src/.libs/pcov.so ]; then
              src="pcov-src/.libs/pcov.so"
            else
              echo "FAIL: built pcov.so not found"; find pcov-src -name 'pcov*.so' -o -name 'pcov*.dylib'; exit 1
            fi
            mkdir -p dist
            cp "$src" "dist/$name"
          fi
          file "dist/$name" || true
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "path=dist/$name" >> "$GITHUB_OUTPUT"

      - name: PHP build-property guard (NTS + non-debug)
        shell: bash
        run: |
          set -euo pipefail
          info="$(php -i)"
          echo "$info" | grep -E "Thread Safety => disabled" \
            || { echo "FAIL: PHP build is ZTS (must be NTS)"; exit 1; }
          echo "$info" | grep -E "Debug Build => no" \
            || { echo "FAIL: PHP is a debug build"; exit 1; }
          echo "PHP API:"; echo "$info" | grep -E "PHP API|Zend Extension Build|PHP Extension Build" || true
          # Windows: the consumer can't express the VS toolset axis, so assert the
          # built dll's toolset (vsNN, from the build zip name) matches the loader
          # PHP's "PHP Extension Build" string. Both come from windows.php.net per
          # minor, so they should agree (8.2/8.3→vs16, 8.4/8.5→vs17).
          if [ "${{ matrix.cell.target_os }}" = "windows" ]; then
            vs="${{ steps.stage.outputs.vs }}"
            echo "$info" | grep -iE "PHP Extension Build.*${vs}" \
              || { echo "FAIL: built toolset $vs != loader PHP Extension Build"; echo "$info" | grep -i 'PHP Extension Build'; exit 1; }
            echo "ok: toolset $vs matches loader PHP"
          fi

      - name: Load + namespace smoke
        shell: bash
        run: |
          set -euo pipefail
          # Hard per-minor gate: the .so must load AND expose the pcov\ namespace
          # functions. Explicit exit codes (assert() is a no-op when
          # zend.assertions=-1); retry to absorb macOS dlopen flakiness.
          so="$PWD/${{ steps.stage.outputs.path }}"
          for attempt in 1 2 3 4 5; do
            if php -d extension="$so" -d display_startup_errors=1 -r \
                 'exit(extension_loaded("pcov") && function_exists("pcov\\start") && function_exists("pcov\\collect") ? 0 : 1);' \
                 2>/tmp/load.err; then
              echo "ok: pcov loaded with namespace functions (attempt $attempt)"; exit 0
            fi
            echo "load attempt $attempt failed; retrying…"; sleep 1
          done
          echo "FAIL: pcov did not load / missing namespace functions after retries"; cat /tmp/load.err || true; exit 1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.name }}
          path: ${{ steps.stage.outputs.path }}
          if-no-files-found: error

  publish:
    name: publish release
    needs: [build, build-pcov]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: staging
          merge-multiple: true

      - name: Generate checksums + manifests
        shell: bash
        run: |
          set -euo pipefail
          cd staging
          # Unmatched globs expand to nothing (not a literal pattern that would
          # crash the for-loops / sha256sum under `set -euo pipefail`). Artifacts
          # are a mix of .so (Unix) and .dll (Windows).
          shopt -s nullglob
          ls -la
          # The download contract Yerd verifies. Prefer the dispatch input tag
          # (on workflow_dispatch GITHUB_REF_NAME is the branch, not the tag).
          version="${{ github.event.inputs.tag || github.ref_name }}"
          minors="8.2 8.3 8.4 8.5"
          cells=4   # macos-aarch64, linux-x86_64, linux-aarch64, windows-x86_64
          yd_files=(yerd-dump-*.so yerd-dump-*.dll)
          count=${#yd_files[@]}
          expected=$(( $(echo $minors | wc -w) * cells ))
          if [ "$count" -ne "$expected" ]; then
            echo "FAIL: expected $expected artifacts, found $count (a cell was dropped)"; exit 1
          fi
          sha256sum "${yd_files[@]}" > SHA256SUMS
          # Derive the php_minors JSON array from $minors so it can't drift.
          php_minors_json=$(echo "$minors" | tr ' ' '\n' | sed 's/.*/"&"/' | paste -sd, -)
          {
            echo "{"
            echo "  \"version\": \"$version\","
            echo "  \"php_minors\": [$php_minors_json],"
            echo "  \"files\": ["
            first=1
            for f in "${yd_files[@]}"; do
              # name pattern: yerd-dump-<minor>-<os>-<arch>.{so,dll}
              base="${f%.*}"; rest="${base#yerd-dump-}"
              php="${rest%%-*}"; osarch="${rest#*-}"
              os="${osarch%%-*}"; arch="${osarch#*-}"
              sha=$(sha256sum "$f" | cut -d' ' -f1)
              size=$(wc -c < "$f" | tr -d ' ')
              [ $first -eq 1 ] || echo ","
              first=0
              printf '    {"name":"%s","php":"%s","os":"%s","arch":"%s","sha256":"%s","size":%s}' \
                "$f" "$php" "$os" "$arch" "$sha" "$size"
            done
            echo ""
            echo "  ]"
            echo "}"
          } > manifest.json
          cat manifest.json
          # Validate manifest is well-formed JSON.
          python3 -c "import json,sys; json.load(open('manifest.json'))"

          # --- pcov: its OWN manifest (pcov-manifest.json) + checksums, SAME
          # schema, NEVER merged into manifest.json above. yerd's yerd-dump
          # matcher only reads manifest.json, so it can't see pcov; yerd's pcov
          # downloader reads pcov-manifest.json from this same release. ---
          # Suffix+prefix-explicit: pcov-*.{so,dll} ignores the php-windows-builder
          # action's own stray php_pcov-*.zip (different prefix), SHA256SUMS-pcov,
          # and pcov-manifest.json.
          pcov_files=(pcov-*.so pcov-*.dll)
          pcount=${#pcov_files[@]}
          if [ "$pcount" -ne "$expected" ]; then
            echo "FAIL: expected $expected pcov artifacts, found $pcount (a cell was dropped)"; exit 1
          fi
          sha256sum "${pcov_files[@]}" > SHA256SUMS-pcov
          {
            echo "{"
            echo "  \"version\": \"$version\","
            echo "  \"php_minors\": [$php_minors_json],"
            echo "  \"files\": ["
            first=1
            for f in "${pcov_files[@]}"; do
              # name pattern: pcov-<minor>-<os>-<arch>.{so,dll}
              base="${f%.*}"; rest="${base#pcov-}"
              php="${rest%%-*}"; osarch="${rest#*-}"
              os="${osarch%%-*}"; arch="${osarch#*-}"
              sha=$(sha256sum "$f" | cut -d' ' -f1)
              size=$(wc -c < "$f" | tr -d ' ')
              [ $first -eq 1 ] || echo ","
              first=0
              printf '    {"name":"%s","php":"%s","os":"%s","arch":"%s","sha256":"%s","size":%s}' \
                "$f" "$php" "$os" "$arch" "$sha" "$size"
            done
            echo ""
            echo "  ]"
            echo "}"
          } > pcov-manifest.json
          cat pcov-manifest.json
          python3 -c "import json,sys; json.load(open('pcov-manifest.json'))"

      # Single provenance attestation over all artifacts (1 Rekor call, not 32).
      # Non-blocking: a transient Sigstore/Rekor outage must not sink a release —
      # the .so/.dll artifacts + SHA256SUMS (integrity) still publish; provenance
      # is defense-in-depth. Re-run the release if you need the attestation.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        continue-on-error: true
        with:
          subject-path: |
            staging/yerd-dump-*.so
            staging/yerd-dump-*.dll
            staging/pcov-*.so
            staging/pcov-*.dll

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            staging/yerd-dump-*.so
            staging/yerd-dump-*.dll
            staging/SHA256SUMS
            staging/manifest.json
            staging/pcov-*.so
            staging/pcov-*.dll
            staging/SHA256SUMS-pcov
            staging/pcov-manifest.json
          fail_on_unmatched_files: true
          generate_release_notes: true
