name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0) — for manual dry runs"
        required: true

permissions:
  contents: write       # create the GitHub Release
  id-token: write       # provenance attestation
  attestations: write   # provenance attestation

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.php }} • ${{ matrix.cell.label }}
    runs-on: ${{ matrix.cell.os }}
    strategy:
      fail-fast: false
      # Two real dimensions → full cross product (4 minors × 3 cells = 12 jobs).
      # NOTE: do NOT express the cells via `include:` on a php-only base matrix —
      # include entries whose keys aren't in the base overwrite each other, so
      # only the last cell survives. `cell` must be a first-class matrix key.
      #
      # Floor is 8.2: ext-php-rs 0.15.15 requires >= 8.1, and zend_observer only
      # observes internal functions (PDO queries) from 8.2+ (8.0/8.1 are EOL).
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]
        cell:
          # Yerd supports Apple Silicon only (no Intel macOS), so there is no
          # macos-x86_64 cell.
          - { os: macos-14,         label: macos-aarch64, target_os: macos, arch: aarch64 }
          - { os: ubuntu-22.04,     label: linux-x86_64,  target_os: linux, arch: x86_64 }
          - { os: ubuntu-22.04-arm, label: linux-aarch64, target_os: linux, arch: aarch64 }
    steps:
      - uses: actions/checkout@v4

      - name: Install PHP (NTS, non-debug, with dev headers)
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: opcache, pdo_sqlite
          tools: none

      - name: Install libclang (bindgen)
        run: |
          if [ "${{ matrix.cell.target_os }}" = "linux" ]; then
            # clang/libclang >= 15: ubuntu-22.04's default llvm-14 emmintrin.h
            # breaks bindgen on PHP's SSE2 intrinsics ("invalid conversion
            # ... __m128i"). Force llvm-15 via both LIBCLANG_PATH (which libclang
            # loads) and -resource-dir (which clang headers it uses). clang-15 is
            # in jammy for both x86_64 and arm64.
            sudo apt-get update && sudo apt-get install -y clang-15 libclang-15-dev llvm-15-dev
            echo "LIBCLANG_PATH=/usr/lib/llvm-15/lib" >> "$GITHUB_ENV"
            echo "BINDGEN_EXTRA_CLANG_ARGS=-resource-dir=$(clang-15 -print-resource-dir)" >> "$GITHUB_ENV"
            clang-15 --version | head -1
          else
            # The runner's Xcode clang (15.0.0) trips bindgen on arm_neon.h fp16
            # intrinsics. Force a newer brew clang via both LIBCLANG_PATH and an
            # explicit -resource-dir (the resource-dir is the part that actually
            # bypasses the broken headers — same fix as Linux).
            brew install llvm
            prefix="$(brew --prefix llvm)"
            test -f "$prefix/lib/libclang.dylib" || { echo "FAIL: libclang.dylib not at $prefix/lib"; exit 1; }
            echo "LIBCLANG_PATH=$prefix/lib" >> "$GITHUB_ENV"
            echo "BINDGEN_EXTRA_CLANG_ARGS=-resource-dir=$("$prefix/bin/clang" -print-resource-dir)" >> "$GITHUB_ENV"
            "$prefix/bin/clang" --version | head -1
          fi

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          # Isolate the cache per PHP version + cell. ext-php-rs embeds the active
          # PHP's module API number in the built .so; a cross-version cache hit
          # produces an .so PHP refuses to load. The key prefix also evicts any
          # previously-poisoned caches.
          key: php-${{ matrix.php }}-${{ matrix.cell.label }}

      - name: Set deployment target (macOS portability)
        if: matrix.cell.target_os == 'macos'
        run: echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"

      - name: Build (release)
        run: cargo build --release

      - name: Stage artifact
        id: stage
        shell: bash
        run: |
          name="yerd-dump-${{ matrix.php }}-${{ matrix.cell.label }}.so"
          if [ "${{ matrix.cell.target_os }}" = "macos" ]; then
            src="target/release/libyerd_dump.dylib"
          else
            src="target/release/libyerd_dump.so"
          fi
          mkdir -p dist
          cp "$src" "dist/$name"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "path=dist/$name" >> "$GITHUB_OUTPUT"

      - name: Build-id property guard (absolute, not self-comparison)
        shell: bash
        run: |
          set -euo pipefail
          info="$(php -i)"
          echo "$info" | grep -E "Thread Safety => disabled" \
            || { echo "FAIL: PHP build is ZTS (must be NTS)"; exit 1; }
          echo "$info" | grep -E "Debug Build => no" \
            || { echo "FAIL: PHP is a debug build"; exit 1; }
          echo "PHP API:"; echo "$info" | grep -E "PHP API|Zend Extension Build|PHP Extension Build" || true
          # Optional cross-vendor check: Yerd publishes the exact build-id its
          # static-php.dev PHP reports per minor. When provided, assert equality.
          if [ -n "${EXPECTED_PHP_EXTENSION_BUILD:-}" ]; then
            echo "$info" | grep -F "$EXPECTED_PHP_EXTENSION_BUILD" \
              || { echo "FAIL: build-id mismatch vs Yerd's PHP"; exit 1; }
          fi

      - name: Load smoke
        shell: bash
        run: |
          # Verify the .so loads via the SCRIPT-EXECUTION path (php -r +
          # extension_loaded), NOT `php -m`. The `-m` module-info path is
          # intermittently flaky on macOS runners (transient dlopen issue under
          # -undefined dynamic_lookup, never on Linux); the script path is the one
          # the real app uses and is reliable. extension_loaded is an exact check.
          # Retry + print startup stderr on total failure as belt-and-braces.
          so="$PWD/${{ steps.stage.outputs.path }}"
          for attempt in 1 2 3 4 5; do
            if php -d extension="$so" -d display_startup_errors=1 \
                 -r 'exit(extension_loaded("yerd-dump") ? 0 : 1);' 2>/tmp/load.err; then
              echo "loaded (attempt $attempt)"; exit 0
            fi
            echo "load attempt $attempt failed; retrying…"; sleep 1
          done
          echo "FAIL: extension did not load after retries"; cat /tmp/load.err || true; exit 1

      - name: Integration smoke
        shell: bash
        run: |
          EXT_SO="$PWD/${{ steps.stage.outputs.path }}" PHP="$(which php)" PORT=2304 \
            bash tests/integration/smoke.sh

      # NOTE: build-provenance attestation is done ONCE in the publish job over all
      # artifacts (1 Rekor call instead of 12), so a transient Sigstore outage can't
      # fail a build leg and skip the release.

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.name }}
          path: ${{ steps.stage.outputs.path }}
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: staging
          merge-multiple: true

      - name: Generate checksums + manifest
        shell: bash
        run: |
          set -euo pipefail
          cd staging
          ls -la
          # The download contract Yerd verifies. Prefer the dispatch input tag
          # (on workflow_dispatch GITHUB_REF_NAME is the branch, not the tag).
          version="${{ github.event.inputs.tag || github.ref_name }}"
          minors="8.2 8.3 8.4 8.5"
          cells=3
          count=$(ls yerd-dump-*.so | wc -l | tr -d ' ')
          expected=$(( $(echo $minors | wc -w) * cells ))
          if [ "$count" -ne "$expected" ]; then
            echo "FAIL: expected $expected artifacts, found $count (a cell was dropped)"; exit 1
          fi
          sha256sum yerd-dump-*.so > SHA256SUMS
          # Derive the php_minors JSON array from $minors so it can't drift.
          php_minors_json=$(echo "$minors" | tr ' ' '\n' | sed 's/.*/"&"/' | paste -sd, -)
          {
            echo "{"
            echo "  \"version\": \"$version\","
            echo "  \"php_minors\": [$php_minors_json],"
            echo "  \"files\": ["
            first=1
            for f in yerd-dump-*.so; do
              # name pattern: yerd-dump-<minor>-<os>-<arch>.so
              base="${f%.so}"; rest="${base#yerd-dump-}"
              php="${rest%%-*}"; osarch="${rest#*-}"
              os="${osarch%%-*}"; arch="${osarch#*-}"
              sha=$(sha256sum "$f" | cut -d' ' -f1)
              size=$(wc -c < "$f" | tr -d ' ')
              [ $first -eq 1 ] || echo ","
              first=0
              printf '    {"name":"%s","php":"%s","os":"%s","arch":"%s","sha256":"%s","size":%s}' \
                "$f" "$php" "$os" "$arch" "$sha" "$size"
            done
            echo ""
            echo "  ]"
            echo "}"
          } > manifest.json
          cat manifest.json
          # Validate manifest is well-formed JSON.
          python3 -c "import json,sys; json.load(open('manifest.json'))"

      # Single provenance attestation over all artifacts (1 Rekor call, not 12).
      # Non-blocking: a transient Sigstore/Rekor outage must not sink a release —
      # the .so artifacts + SHA256SUMS (integrity) still publish; provenance is
      # defense-in-depth. Re-run the release if you need the attestation.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        continue-on-error: true
        with:
          subject-path: staging/yerd-dump-*.so

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            staging/yerd-dump-*.so
            staging/SHA256SUMS
            staging/manifest.json
          fail_on_unmatched_files: true
          generate_release_notes: true
