name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded PR runs, but never cancel a push to a branch (so merged-commit
# CI signal is preserved): head_ref is set only for pull_request events.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-test-smoke:
    name: lint • test • smoke (linux x86_64, PHP ${{ matrix.php }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        # Cover the supported floor (8.2) and ceiling (8.5) on PRs so a
        # version-specific compile/observer break is caught here, not only at
        # release time.
        php: ["8.2", "8.5"]
    steps:
      - uses: actions/checkout@v4

      - name: Install PHP (NTS, with dev headers + php-config)
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: opcache, pdo_sqlite
          ini-values: opcache.enable_cli=1
          tools: none

      - name: Install libclang (bindgen) + build deps
        run: |
          # clang/libclang >= 15: the default libclang-dev on ubuntu-22.04 is
          # llvm-14, whose emmintrin.h trips bindgen on PHP's SSE2 intrinsics
          # ("invalid conversion ... __m128i"). Force bindgen to use llvm-15:
          #   - LIBCLANG_PATH: which libclang.so clang-sys loads
          #   - -resource-dir: which clang headers (the fixed emmintrin.h) it uses
          # The resource-dir is belt-and-braces in case libclang-14 is still found.
          sudo apt-get update
          sudo apt-get install -y clang-15 libclang-15-dev llvm-15-dev
          echo "LIBCLANG_PATH=/usr/lib/llvm-15/lib" >> "$GITHUB_ENV"
          echo "BINDGEN_EXTRA_CLANG_ARGS=-resource-dir=$(clang-15 -print-resource-dir)" >> "$GITHUB_ENV"
          echo "clang-15: $(clang-15 --version | head -1)"
          echo "resource-dir: $(clang-15 -print-resource-dir)"
          ls -l /usr/lib/llvm-15/lib/libclang.so*

      - name: Install Rust (stable, fmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          # Isolate the cache PER PHP VERSION. ext-php-rs compiles against the
          # active PHP's headers and the built .so embeds that PHP's module API
          # number — but cargo/rust-cache can't see the external PHP changed, so a
          # cross-version cache hit yields an .so with the wrong API (load fails:
          # "module API=... PHP compiled with module API=..."). The key prefix
          # also evicts any previously-poisoned caches.
          key: php-${{ matrix.php }}

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --all

      - name: Build (debug)
        run: cargo build

      - name: Integration smoke
        run: |
          cp target/debug/libyerd_dump.so /tmp/yerd_dump.so
          EXT_SO=/tmp/yerd_dump.so PHP=$(which php) PORT=2304 bash tests/integration/smoke.sh

  # Independent of the Rust crate above: build the upstream pcov C extension from
  # its pinned source and assert it loads, so a pcov toolchain/version break is
  # caught on PRs rather than only when cutting a pcov-v* release. Covers the
  # floor (8.2) and ceiling (8.5), and BOTH toolchains (linux + the Homebrew-PHP
  # macOS path, which needs the pcre2 header fix) — the full minor × cell matrix
  # runs in release-pcov.yml. Mirrors that workflow's pin, build and smoke check.
  pcov-build-smoke:
    name: pcov build • smoke (${{ matrix.cell.label }}, PHP ${{ matrix.php }})
    runs-on: ${{ matrix.cell.os }}
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.5"]
        cell:
          - { os: ubuntu-22.04, label: linux-x86_64, target_os: linux }
          - { os: macos-14,     label: macos-aarch64, target_os: macos }
    env:
      PCOV_VERSION: "1.0.12"
    steps:
      - name: Install PHP (NTS, with dev headers + phpize)
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: none

      - name: Fetch pinned pcov source
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/krakjoe/pcov/archive/refs/tags/v${PCOV_VERSION}.tar.gz" -o pcov-src.tar.gz
          mkdir -p pcov-src
          tar -xzf pcov-src.tar.gz -C pcov-src --strip-components=1
          test -f pcov-src/pcov.c || { echo "FAIL: pcov.c not found"; exit 1; }

      - name: Build pcov
        run: |
          set -euo pipefail
          # macOS: pcov pulls in PHP's php_pcre.h, which #includes "pcre2.h" —
          # a header that lives in the Homebrew pcre2 keg, not PHP's include dir.
          # Point CPPFLAGS at it (same fix as release-pcov.yml). No-op on Linux.
          if [ "${{ matrix.cell.target_os }}" = "macos" ]; then
            brew install pcre2
            export CPPFLAGS="-I$(brew --prefix pcre2)/include${CPPFLAGS:+ $CPPFLAGS}"
          fi
          cd pcov-src
          phpize
          ./configure --enable-pcov
          make -j"$(getconf _NPROCESSORS_ONLN)"

      - name: Load + namespace smoke
        run: |
          set -euo pipefail
          if [ -f pcov-src/modules/pcov.so ]; then so="pcov-src/modules/pcov.so"; else so="pcov-src/.libs/pcov.so"; fi
          php -d extension="$PWD/$so" -d display_startup_errors=1 -r \
            'exit(extension_loaded("pcov") && function_exists("pcov\\start") && function_exists("pcov\\collect") ? 0 : 1);'
          echo "ok: pcov ${{ matrix.php }} (${{ matrix.cell.label }}) built and loaded"
