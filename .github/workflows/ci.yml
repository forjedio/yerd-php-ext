name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded PR runs, but never cancel a push to a branch (so merged-commit
# CI signal is preserved): head_ref is set only for pull_request events.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-test-smoke:
    name: lint • test • smoke (linux x86_64, PHP ${{ matrix.php }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        # Cover the ABI floor (8.0) and ceiling (8.5) on PRs so a version-specific
        # compile/observer break is caught here, not only at release time.
        php: ["8.0", "8.5"]
    steps:
      - uses: actions/checkout@v4

      - name: Install PHP (NTS, with dev headers + php-config)
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: opcache, pdo_sqlite
          ini-values: opcache.enable_cli=1
          tools: none

      - name: Install libclang (bindgen) + build deps
        run: |
          # clang/libclang >= 15: the default libclang-dev on ubuntu-22.04 is
          # llvm-14, whose emmintrin.h trips bindgen on PHP's SSE2 intrinsics
          # ("invalid conversion ... __m128i"). Force bindgen to use llvm-15:
          #   - LIBCLANG_PATH: which libclang.so clang-sys loads
          #   - -resource-dir: which clang headers (the fixed emmintrin.h) it uses
          # The resource-dir is belt-and-braces in case libclang-14 is still found.
          sudo apt-get update
          sudo apt-get install -y clang-15 libclang-15-dev llvm-15-dev
          echo "LIBCLANG_PATH=/usr/lib/llvm-15/lib" >> "$GITHUB_ENV"
          echo "BINDGEN_EXTRA_CLANG_ARGS=-resource-dir=$(clang-15 -print-resource-dir)" >> "$GITHUB_ENV"
          echo "clang-15: $(clang-15 --version | head -1)"
          echo "resource-dir: $(clang-15 -print-resource-dir)"
          ls -l /usr/lib/llvm-15/lib/libclang.so*

      - name: Install Rust (stable, fmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --all

      - name: Build (debug)
        run: cargo build

      - name: Integration smoke
        run: |
          cp target/debug/libyerd_dump.so /tmp/yerd_dump.so
          EXT_SO=/tmp/yerd_dump.so PHP=$(which php) PORT=2304 bash tests/integration/smoke.sh
