name: Release pcov

# ISOLATED, ADDITIVE pipeline for the upstream krakjoe/pcov code-coverage driver.
#
# Why a separate workflow + separate manifest (do NOT merge into release.yml):
# the Yerd consumer (bin/yerdd/src/ext_install.rs) matches manifest entries on
# (php, os, arch) ONLY — there is no extension-name discriminator. If pcov files
# landed in yerd-dump's manifest.json, Yerd could download a pcov .so when it
# wanted yerd-dump. So pcov gets its OWN trigger (pcov-v* tags), its OWN
# manifest (pcov-manifest.json) and checksums (SHA256SUMS-pcov), on its OWN
# release. release.yml (the yerd-dump pipeline, v* tags) stays untouched.
#
# pcov is upstream C, not Rust — built with the standard PHP extension toolchain
# (phpize && ./configure --enable-pcov && make). No Rust, no bindgen, no libclang.

on:
  push:
    tags: ["pcov-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. pcov-v1.0.12) — for manual dry runs"
        required: true

permissions:
  contents: write       # create the GitHub Release
  id-token: write       # provenance attestation
  attestations: write   # provenance attestation

env:
  # Pinned upstream pcov release tag. v1.0.12 (2024-12-04) is the latest tag and
  # the version PECL/windows.php.net publish for PHP 8.5; its source has no
  # upper-bound PHP_VERSION_ID gate (8.5 takes the `>= 80400` branch), so it
  # compiles across 8.2–8.5. The per-cell smoke test below is the hard gate: if
  # any minor fails to build or load, that leg fails and the count guard blocks
  # the release. Bump this (and the docs/tag) to adopt a newer pcov.
  PCOV_VERSION: "1.0.12"

jobs:
  build:
    name: pcov ${{ matrix.php }} • ${{ matrix.cell.label }}
    runs-on: ${{ matrix.cell.os }}
    strategy:
      fail-fast: false
      # Same shape as release.yml: 4 minors × 3 cells = 12 jobs. `cell` is a
      # first-class matrix key (NOT an include: overlay) for the same reason
      # documented in release.yml — include entries whose keys aren't in the
      # base matrix overwrite each other.
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]
        cell:
          # Yerd is Apple-Silicon-only — no Intel macOS cell.
          - { os: macos-14,         label: macos-aarch64, target_os: macos, arch: aarch64 }
          - { os: ubuntu-22.04,     label: linux-x86_64,  target_os: linux, arch: x86_64 }
          - { os: ubuntu-22.04-arm, label: linux-aarch64, target_os: linux, arch: aarch64 }
    steps:
      - name: Install PHP (NTS, non-debug, with dev headers + phpize)
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          # Do NOT add pcov here — we build it from source. coverage:none avoids
          # setup-php pulling in a pcov/xdebug of its own.
          coverage: none
          tools: none

      - name: Set deployment target (macOS portability)
        if: matrix.cell.target_os == 'macos'
        run: echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"

      - name: Fetch pinned pcov source
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/krakjoe/pcov/archive/refs/tags/v${PCOV_VERSION}.tar.gz"
          echo "Fetching $url"
          curl -fsSL "$url" -o pcov-src.tar.gz
          mkdir -p pcov-src
          tar -xzf pcov-src.tar.gz -C pcov-src --strip-components=1
          ls -la pcov-src
          test -f pcov-src/pcov.c || { echo "FAIL: pcov.c not found in source tarball"; exit 1; }

      - name: Build pcov (phpize && configure && make)
        shell: bash
        run: |
          set -euo pipefail
          # macOS only: pcov includes PHP's ext/pcre/php_pcre.h, which #includes
          # "pcre2.h". With Homebrew PHP that header lives in the separate pcre2
          # keg (not in PHP's include dir), so the compile fails with
          # "'pcre2.h' file not found". Add the keg's include dir to CPPFLAGS.
          # (Linux's setup-php ships pcre2 headers inline, so no flag is needed
          # there.)
          if [ "${{ matrix.cell.target_os }}" = "macos" ]; then
            brew install pcre2   # idempotent; PHP already depends on it
            export CPPFLAGS="-I$(brew --prefix pcre2)/include${CPPFLAGS:+ $CPPFLAGS}"
            echo "CPPFLAGS=$CPPFLAGS"
          fi
          cd pcov-src
          phpize
          ./configure --enable-pcov
          make -j"$(getconf _NPROCESSORS_ONLN)"

      - name: Stage artifact
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          name="pcov-${{ matrix.php }}-${{ matrix.cell.label }}.so"
          # phpize/libtool puts the loadable module at modules/pcov.so; on some
          # configs the real object is .libs/pcov.so behind a libtool wrapper.
          # Prefer modules/, fall back to .libs/.
          if [ -f pcov-src/modules/pcov.so ]; then
            src="pcov-src/modules/pcov.so"
          elif [ -f pcov-src/.libs/pcov.so ]; then
            src="pcov-src/.libs/pcov.so"
          else
            echo "FAIL: built pcov.so not found"; find pcov-src -name 'pcov*.so' -o -name 'pcov*.dylib'; exit 1
          fi
          mkdir -p dist
          cp "$src" "dist/$name"
          file "dist/$name" || true
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "path=dist/$name" >> "$GITHUB_OUTPUT"

      - name: PHP build-property guard (NTS + non-debug)
        shell: bash
        run: |
          set -euo pipefail
          info="$(php -i)"
          echo "$info" | grep -E "Thread Safety => disabled" \
            || { echo "FAIL: PHP build is ZTS (must be NTS)"; exit 1; }
          echo "$info" | grep -E "Debug Build => no" \
            || { echo "FAIL: PHP is a debug build"; exit 1; }
          echo "PHP API:"; echo "$info" | grep -E "PHP API|Zend Extension Build|PHP Extension Build" || true

      - name: Load + namespace smoke
        shell: bash
        run: |
          set -euo pipefail
          # The hard gate per minor: the .so must load AND expose the pcov\
          # namespace functions. Uses the script-execution path (the one Yerd's
          # PHP actually uses), with explicit exit codes (assert() is a no-op
          # when zend.assertions=-1). Retry to absorb the intermittent macOS
          # dlopen flakiness documented in release.yml.
          so="$PWD/${{ steps.stage.outputs.path }}"
          for attempt in 1 2 3 4 5; do
            if php -d extension="$so" -d display_startup_errors=1 -r \
                 'exit(extension_loaded("pcov") && function_exists("pcov\\start") && function_exists("pcov\\collect") ? 0 : 1);' \
                 2>/tmp/load.err; then
              echo "ok: pcov loaded with namespace functions (attempt $attempt)"; exit 0
            fi
            echo "load attempt $attempt failed; retrying…"; sleep 1
          done
          echo "FAIL: pcov did not load / missing namespace functions after retries"; cat /tmp/load.err || true; exit 1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.name }}
          path: ${{ steps.stage.outputs.path }}
          if-no-files-found: error

  publish:
    name: publish pcov release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: staging
          merge-multiple: true

      - name: Generate checksums + pcov-manifest.json
        shell: bash
        run: |
          set -euo pipefail
          cd staging
          ls -la
          # Same schema Yerd parses (version / php_minors / files[name,php,os,
          # arch,sha256,size]) — just a DIFFERENT file name so it never collides
          # with yerd-dump's manifest.json.
          version="${{ github.event.inputs.tag || github.ref_name }}"
          minors="8.2 8.3 8.4 8.5"
          cells=3
          count=$(ls pcov-*.so | wc -l | tr -d ' ')
          expected=$(( $(echo $minors | wc -w) * cells ))
          if [ "$count" -ne "$expected" ]; then
            echo "FAIL: expected $expected artifacts, found $count (a cell was dropped)"; exit 1
          fi
          sha256sum pcov-*.so > SHA256SUMS-pcov
          php_minors_json=$(echo "$minors" | tr ' ' '\n' | sed 's/.*/"&"/' | paste -sd, -)
          {
            echo "{"
            echo "  \"version\": \"$version\","
            echo "  \"php_minors\": [$php_minors_json],"
            echo "  \"files\": ["
            first=1
            for f in pcov-*.so; do
              # name pattern: pcov-<minor>-<os>-<arch>.so
              base="${f%.so}"; rest="${base#pcov-}"
              php="${rest%%-*}"; osarch="${rest#*-}"
              os="${osarch%%-*}"; arch="${osarch#*-}"
              sha=$(sha256sum "$f" | cut -d' ' -f1)
              size=$(wc -c < "$f" | tr -d ' ')
              [ $first -eq 1 ] || echo ","
              first=0
              printf '    {"name":"%s","php":"%s","os":"%s","arch":"%s","sha256":"%s","size":%s}' \
                "$f" "$php" "$os" "$arch" "$sha" "$size"
            done
            echo ""
            echo "  ]"
            echo "}"
          } > pcov-manifest.json
          cat pcov-manifest.json
          python3 -c "import json,sys; json.load(open('pcov-manifest.json'))"

      # One provenance attestation over all pcov artifacts. Non-blocking: a
      # transient Sigstore/Rekor outage must not sink the release.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        continue-on-error: true
        with:
          subject-path: staging/pcov-*.so

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            staging/pcov-*.so
            staging/SHA256SUMS-pcov
            staging/pcov-manifest.json
          fail_on_unmatched_files: true
          generate_release_notes: true
